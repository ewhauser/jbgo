linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - revive
    - misspell
    - gofmt
    - goimports

linters-settings:
  revive:
    rules:
      - name: exported
        disabled: true

  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance

  misspell:
    locale: US

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
