version: "2"

formatters:
  enable:
    - goimports
linters:
  enable:
    - depguard
    - errcheck
    - forbidigo
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - revive
    - misspell
    - modernize
    - bodyclose
    - containedctx
    - contextcheck
    - errorlint
    - nilerr
    - noctx
    - paralleltest
    - testifylint
    - unconvert
    - unparam
    - nilaway
    - regexponce

  settings:
    custom:
      nilaway:
        type: module
        description: Static analysis tool to detect potential nil panics in Go code.
        settings:
          include-pkgs: github.com/ewhauser/gbash
      regexponce:
        type: module
        description: Linter that checks regexp.Compile and friends are called only once at initialization.

    revive:
      rules:
        - name: exported
          disabled: true

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - typeDefFirst
        - todoCommentWithoutDetail
        - unnamedResult
        - initClause
        - commentedOutCode

    misspell:
      locale: US

    depguard:
      rules:
        builtins_host_packages:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
          deny:
            - pkg: os/exec$
              desc: Use inv.Exec or executeCommand so subprocess policy is enforced.
            - pkg: path/filepath$
              desc: Use gbfs/path helpers and inv.FS so sandbox path policy is enforced.
            - pkg: os/user$
              desc: Use invocation-provided identity instead of host user lookups.
            - pkg: os/signal$
              desc: Do not mutate process-wide signal handlers from commands.
            - pkg: plugin$
              desc: Do not load host plugins from commands.
            - pkg: crypto/tls$
              desc: Use inv.Fetch instead of direct host TLS clients or listeners.
            - pkg: net$
              desc: Use invocation network capabilities instead of direct host networking.
            - pkg: io/ioutil$
              desc: Use inv.FS or commands.ReadAll so sandbox policy is enforced.
            - pkg: debug/buildinfo$
              desc: Do not read build info from host filesystem.
        builtins_net_http:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/curl.go"
            - "!internal/builtins/file.go"
          deny:
            - pkg: net/http
              desc: Use inv.Fetch for network access; keep pure HTTP helpers behind reviewed wrappers.
        builtins_term:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/ls.go"
            - "!internal/builtins/test.go"
          deny:
            - pkg: golang.org/x/term$
              desc: Use reviewed helpers for terminal detection instead of raw file descriptor probes.
        builtins_syscall_imports:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/basenc.go"
            - "!internal/builtins/basenc_formats.go"
            - "!internal/builtins/readlink.go"
            - "!internal/builtins/realpath.go"
            - "!internal/builtins/rmdir.go"
            - "!internal/builtins/tee.go"
            - "!internal/builtins/truncate.go"
            - "!internal/builtins/unlink.go"
            - "!internal/builtins/yes.go"
          deny:
            - pkg: syscall$
              desc: Do not access host syscalls directly from commands.
        builtins_unix_imports:
          files:
            - internal/builtins/*.go
            - "!internal/builtins/*_test.go"
            - "!internal/builtins/cat_appendmode_unix.go"
          deny:
            - pkg: golang.org/x/sys/unix$
              desc: Do not access host kernel APIs directly from commands.
        broad_host_packages:
          files:
            - "*.go"
            - commands/**/*.go
            - internal/**/*.go
            - trace/**/*.go
            - policy/**/*.go
            - network/**/*.go
            - third_party/mvdan-sh/**/*.go
            - "!**/*_test.go"
          deny:
            - pkg: os/exec$
              desc: Use inv.Exec or executeCommand so subprocess policy is enforced.
            - pkg: path/filepath$
              desc: Use gbfs/path helpers and inv.FS so sandbox path policy is enforced.
            - pkg: os/user$
              desc: Use invocation-provided identity instead of host user lookups.
            - pkg: os/signal$
              desc: Do not mutate process-wide signal handlers from commands.
            - pkg: plugin$
              desc: Do not load host plugins from commands.
            - pkg: crypto/tls$
              desc: Use inv.Fetch instead of direct host TLS clients or listeners.
            - pkg: unsafe$
              desc: Do not use unsafe in sandbox code.
            - pkg: runtime/cgo$
              desc: Do not use CGO FFI in sandbox code.
            - pkg: ^log$
              desc: Use invocation-provided writers instead of host log sinks.
            - pkg: io/ioutil$
              desc: Use inv.FS or commands.ReadAll so sandbox policy is enforced.
            - pkg: debug/buildinfo$
              desc: Do not read build info from host filesystem.
        broad_syscall:
          files:
            - "*.go"
            - commands/**/*.go
            - internal/**/*.go
            - trace/**/*.go
            - policy/**/*.go
            - network/**/*.go
            - third_party/mvdan-sh/**/*.go
            - "!**/*_test.go"
            - "!internal/builtins/basenc.go"
            - "!internal/builtins/basenc_formats.go"
            - "!internal/builtins/readlink.go"
            - "!internal/builtins/realpath.go"
            - "!internal/builtins/rmdir.go"
            - "!internal/builtins/tee.go"
            - "!internal/builtins/truncate.go"
            - "!internal/builtins/unlink.go"
            - "!internal/builtins/yes.go"
          deny:
            - pkg: syscall$
              desc: Do not access host syscalls directly from commands.
        broad_unix:
          files:
            - "*.go"
            - commands/**/*.go
            - internal/**/*.go
            - trace/**/*.go
            - policy/**/*.go
            - network/**/*.go
            - third_party/mvdan-sh/**/*.go
            - "!**/*_test.go"
            - "!internal/builtins/cat_appendmode_unix.go"
            - "!internal/runtime/arch_default_unix.go"
          deny:
            - pkg: golang.org/x/sys/unix$
              desc: Do not access host kernel APIs directly from commands.
        broad_term:
          files:
            - "*.go"
            - commands/**/*.go
            - internal/**/*.go
            - trace/**/*.go
            - policy/**/*.go
            - network/**/*.go
            - third_party/mvdan-sh/**/*.go
            - "!**/*_test.go"
            - "!internal/builtins/ls.go"
            - "!internal/builtins/test.go"
          deny:
            - pkg: golang.org/x/term$
              desc: Use reviewed helpers for terminal detection instead of raw file descriptor probes.
        broad_net:
          files:
            - "*.go"
            - commands/**/*.go
            - internal/**/*.go
            - trace/**/*.go
            - policy/**/*.go
            - network/**/*.go
            - third_party/mvdan-sh/**/*.go
            - "!**/*_test.go"
            - "!network/network.go"
          deny:
            - pkg: net$
              desc: Use invocation network capabilities instead of direct host networking.
        broad_net_http:
          files:
            - "*.go"
            - commands/**/*.go
            - internal/**/*.go
            - trace/**/*.go
            - policy/**/*.go
            - network/**/*.go
            - third_party/mvdan-sh/**/*.go
            - "!**/*_test.go"
            - "!internal/builtins/curl.go"
            - "!internal/builtins/file.go"
            - "!network/network.go"
          deny:
            - pkg: net/http
              desc: Use inv.Fetch for network access; keep pure HTTP helpers behind reviewed wrappers.

    forbidigo:
      analyze-types: true
      forbid:
        - pattern: '^os\.(Open|OpenFile|Create|ReadFile|WriteFile|Stat|Lstat|ReadDir|Mkdir|MkdirAll|Remove|RemoveAll|Rename|Symlink|Link|Chmod|Chown|Chtimes|Readlink|Getwd|Chdir|DirFS|OpenInRoot|OpenRoot|MkdirTemp|CreateTemp|TempDir)$'
          msg: Use inv.FS or the shared command helpers so sandbox policy is enforced.
        - pattern: '^os\.(Getenv|LookupEnv|Environ|ExpandEnv|Setenv|Unsetenv|Clearenv|UserHomeDir|Hostname|Args|Exit)$'
          msg: Use invocation-provided environment and process state instead of host globals.
        - pattern: '^exec\.(Command|CommandContext)$'
          pkg: '^os/exec$'
          msg: Use inv.Exec or executeCommand so subprocess policy is enforced.
        - pattern: '^os\.StartProcess$'
          msg: Use inv.Exec or executeCommand so subprocess policy is enforced.
        - pattern: '^net\.(Dial|DialContext|DialTimeout|LookupAddr|LookupCNAME|LookupHost|LookupIP|LookupIPAddr|LookupMX|LookupNS|LookupPort|LookupSRV|LookupTXT)$'
          pkg: '^net$'
          msg: Use invocation network capabilities instead of direct host networking.
        - pattern: '^http\.(DefaultClient|DefaultTransport|Client|Transport|Get|Head|Post|PostForm|NewRequest|NewRequestWithContext|ListenAndServe|ListenAndServeTLS|Serve|ServeTLS)$'
          pkg: '^net/http$'
          msg: Use inv.Fetch so network policy is enforced.
        - pattern: '^tls\.(Dial|DialWithDialer|Listen)$'
          pkg: '^crypto/tls$'
          msg: Use inv.Fetch instead of direct host TLS clients or listeners.
        - pattern: '^syscall\.(Kill|Getpid|Getppid|Getpgrp|Getpgid|Setpgid|Setsid|Tgkill|Open|Openat|Readlink|Symlink|Link|Rename|Unlink|Unlinkat|Mkdir|Mkdirat|Exec|ForkExec|StartProcess|Mount|PivotRoot|Chdir|Chroot|Fchdir|Connect|Socket|Socketpair|Bind|Listen|Accept|Accept4|Dup|Dup2|Dup3|Syscall|Syscall6|RawSyscall|RawSyscall6)$'
          msg: Do not access host syscalls directly from commands.
        - pattern: '^unix\.(Uname|Umask|Open|Openat|Readlink|Readlinkat|Symlink|Symlinkat|Link|Linkat|Rename|Renameat|Unlink|Unlinkat|Mkdir|Mkdirat|Exec|ForkExec|Mount|PivotRoot|Chdir|Chroot|Fchdir|Connect|Socket|Socketpair|Bind|Listen|Accept|Accept4|Dup|Dup2|Dup3|Ioctl.*|Kill|Setns|Getpid|Getppid|Getpgrp|Getpgid|Setpgid|Setsid|Tgkill|PidfdSendSignal)$'
          pkg: '^golang\.org/x/sys/unix$'
          msg: Do not read or mutate host process or kernel state directly from commands.
        - pattern: '^commands\.CommandFS\.raw$'
          pkg: '^github\.com/ewhauser/gbash/commands$'
          msg: Do not bypass CommandFS policy checks; use inv.FS methods instead.
        - pattern: '^io\.ReadAll$'
          pkg: '^io$'
          msg: Use commands.ReadAll, commands.ReadAllStdin, or inv.FS.ReadFile so MaxFileBytes is enforced.
        - pattern: '^signal\.(Notify|NotifyContext|Stop|Reset|Ignore)$'
          pkg: '^os/signal$'
          msg: Do not register host signal handlers; use the virtual trap subsystem.
        - pattern: '^os\.(FindProcess|Geteuid|Getegid|Getuid|Getgid|Getpid|Getppid)$'
          msg: Use invocation-provided identity or process state instead of host process state.
        - pattern: '^os\.(Stdout|Stderr|Stdin)$'
          msg: Use invocation-provided writers (inv.Stdout/inv.Stderr/inv.Stdin) instead of host stdio.
        - pattern: '^fmt\.(Print|Println|Printf)$'
          pkg: '^fmt$'
          msg: Use fmt.Fprint with inv.Stdout/inv.Stderr instead of writing to host stdout.
        - pattern: '^os\.(Pipe|NewFile|CopyFS|Executable)$'
          msg: Use invocation-provided capabilities instead of direct host access.
        - pattern: '^os\.(UserCacheDir|UserConfigDir)$'
          msg: Use invocation-provided paths instead of host user directories.
        - pattern: '^os\.(Getgroups|Setgroups)$'
          msg: Use invocation-provided identity instead of host group lookups.
        - pattern: '^ioutil\.(ReadFile|WriteFile|ReadDir|TempDir|TempFile|ReadAll)$'
          pkg: '^io/ioutil$'
          msg: Use inv.FS or commands.ReadAll so sandbox policy is enforced.
        - pattern: '^net\.(ResolveIPAddr|ResolveTCPAddr|ResolveUDPAddr|ResolveUnixAddr|InterfaceAddrs|Interfaces)$'
          pkg: '^net$'
          msg: Use invocation network capabilities instead of direct host networking.
        - pattern: '^runtime\.(NumCPU|GOMAXPROCS)$'
          pkg: '^runtime$'
          msg: Use invocation-provided resource limits instead of host runtime state.
        - pattern: '^buildinfo\.ReadFile$'
          pkg: '^debug/buildinfo$'
          msg: Do not read build info from host filesystem.
        - pattern: '^exec\.LookPath$'
          pkg: '^os/exec$'
          msg: Do not search host PATH; use invocation-provided command resolution.

  exclusions:
    rules:
      - path-except: (commands|internal|trace|policy|network|contrib|third_party)/
        linters:
          - depguard
      - path-except: (commands|internal|trace|policy|network|contrib|third_party)/
        linters:
          - forbidigo
      - path: _test\.go$
        linters:
          - depguard
      - path: _test\.go$
        linters:
          - forbidigo
      - path: _test\.go$
        linters:
          - nilaway
      - path: _test\.go$
        linters:
          - regexponce
      - path: commands/invocation_capabilities\.go$
        text: "use of `fs\\.raw` forbidden because \"Do not bypass CommandFS policy checks; use inv\\.FS methods instead\\.\""
        linters:
          - forbidigo
      - path: commands/read\.go$
        text: "use of `io\\.ReadAll` forbidden because \"Use commands\\.ReadAll, commands\\.ReadAllStdin, or inv\\.FS\\.ReadFile so MaxFileBytes is enforced\\.\""
        linters:
          - forbidigo
      - path: internal/runtime/arch_default_unix\.go$
        text: "use of `unix\\.Uname` forbidden"
        linters:
          - forbidigo
      - path: contrib/extras/cmd/gbash-extras/main\.go$
        linters:
          - forbidigo
      - path: internal/fuzztest/
        linters:
          - forbidigo
      - path: internal/searchadapter/
        linters:
          - forbidigo
      - path: network/network\.go$
        linters:
          - forbidigo
      - path: ^internal/shell/internal/testing\.go$
        linters:
          - forbidigo
          - depguard
      - path: ^internal/shell/(expand|fileutil|internal|interp|pattern|shell|syntax)/
        linters:
          - containedctx
          - contextcheck
          - noctx
          - paralleltest
          - errcheck
          - errorlint
          - gocritic
          - ineffassign
          - misspell
          - modernize
          - staticcheck
          - unparam
          - unused
      - path: internal/conformance/runner\.go$
        text: "use of `exec\\.LookPath` forbidden"
        linters:
          - forbidigo
      - text: "INTERNAL ERROR"
        linters:
          - nilaway

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
