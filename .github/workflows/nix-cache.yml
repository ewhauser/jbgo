name: Nix Cache

on:
  workflow_dispatch:
    inputs:
      package:
        description: 'Package to build and cache'
        required: true
        default: 'coreutils-test-suite'
        type: choice
        options:
          - coreutils-test-suite
          - bash
          - bats

permissions:
  contents: read

jobs:
  build-and-cache:
    runs-on: ubuntu-latest
    # Only run on the main repo by the owner
    if: github.repository == 'ewhauser/gbash' && github.actor == 'ewhauser'
    environment: nix-cache
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30

      - name: Build package
        run: nix build .#${{ inputs.package }}

      - name: Configure R2 credentials
        run: |
          mkdir -p ~/.aws
          cat > ~/.aws/credentials << EOF
          [r2]
          aws_access_key_id = ${{ secrets.R2_ACCESS_KEY_ID }}
          aws_secret_access_key = ${{ secrets.R2_SECRET_ACCESS_KEY }}
          EOF
          chmod 600 ~/.aws/credentials

      - name: Configure Nix signing key
        run: |
          mkdir -p ~/.config/nix
          echo "${{ secrets.NIX_SECRET_KEY }}" > ~/.config/nix/secret-key.pem
          chmod 600 ~/.config/nix/secret-key.pem

      - name: Upload to R2 cache
        run: |
          nix copy --to "s3://gbash-nix-cache?profile=r2&endpoint=aea0a2c4e5c5c74a3e84a12c855a7e37.r2.cloudflarestorage.com" \
            --secret-key-files ~/.config/nix/secret-key.pem ./result
