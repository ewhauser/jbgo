name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make build

      - run: make test

  fuzz-smoke:
    if: github.event_name == 'pull_request'
    name: Fuzz Smoke (${{ matrix.shard }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - shard: core
            make_var: FUZZ_SMOKE_SHARD_CORE
          - shard: paths
            make_var: FUZZ_SMOKE_SHARD_PATHS
          - shard: data
            make_var: FUZZ_SMOKE_SHARD_DATA
          - shard: security
            make_var: FUZZ_SMOKE_SHARD_SECURITY
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: make fuzz-shard
        env:
          FUZZ_SHARD: ${{ matrix.make_var }}
          FUZZTIME: 3s
