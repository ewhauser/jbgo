name: Publish custom-gcl

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - .custom-gcl.yml
      - tools/regexponce-gclplugin/**/*.go

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod

      - run: go mod download

      - name: Build custom-gcl
        run: GOTOOLCHAIN=go1.26.1 CGO_ENABLED=0 go run github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.3 custom

      - name: Package tarball
        run: tar czf custom-gcl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz custom-gcl

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: custom-gcl-${{ matrix.goos }}-${{ matrix.goarch }}
          path: custom-gcl-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute release tag
        id: tag
        run: |
          local_deps=$(grep '^ *path:' .custom-gcl.yml 2>/dev/null | sed 's/^ *path: *//' | while read -r d; do find "$d" -type f -name '*.go' 2>/dev/null | sort; done)
          tag="custom-gcl/$(cat .custom-gcl.yml $local_deps | sha256sum | cut -c1-12)"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"

      - name: Check if release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG" artifacts/custom-gcl-*.tar.gz \
            --title "custom-gcl ($(grep 'version:' .custom-gcl.yml | head -1 | awk '{print $2}'))" \
            --notes "Auto-built custom golangci-lint binary with nilaway plugin.

          Config hash: ${TAG#custom-gcl/}
          Source: .custom-gcl.yml"
